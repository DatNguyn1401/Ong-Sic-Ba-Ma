<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../FolderViDu">
    <style>
      .khung {
        border: 1px solid black;
        border-radius: 5px;
        padding: 5px;
        width: fit-content;
      }
      .chinh {
        display: block;
        margin-left: 5px;
        margin-top: 5px;
        height: 23px;
        width: 90%;
        border-radius: 5px;
      }
      .chinho{
        border-radius: 3px;
        padding: 5px;
      }
      .button {
        padding: 4px;
        color: white;
        background-color: rgb(35, 104, 255);
        margin-left: 5px;
        margin-bottom: 10px;
        margin-top: 3px;
        width: 95%;
        text-align: center;
        border-radius: 5px;
      }
      .chinho:focus{
        background-image: url(../../FolderViDu/Pressure.webp);
        background-position: center;
      }
    </style>
  </head>
  <body>
    <div class="khung">
      <label class="chinh" for="">Ten dang nhap</label>
      <input
        placeholder="Nhap ten dang nhap"
        class="chinho chinh"
        style="margin-bottom: 10px"
        type="text"
        name=""
        id=""
      />
      <label class="chinh" for="">Mat khau</label>
      <input
        placeholder="Nhap mat khau"
        class="chinho chinh"
        style="margin-bottom: 10px"
        type="password"
        name=""
        id=""
      />
      <input class="button" type="button" value="Dang nhap" name="" id="" />
    </div>
  </body>
</html>
